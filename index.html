<!DOCTYPE html>
<html>
<head>
    <title>Сибирь и её экологические проблемы</title>
    <style>
        body
        {
            background-color: #f2f4f8;
            margin: 0;
        }
        .hero
        {
            position: relative;
            background-image: url('Siberia.jpg');
            background-size: cover;
            background-position: center;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero h1
        {
            position: relative;
            z-index: 2;      /* Чтобы заголовок был ПОВЕРХ затемнения */
            color: rgba(255,255,255,0.8);    /* Белый цвет текста */
            font-size: 48px;
            text-align: center;
            font-family: Bebas Neue Cyrillic;
            font-weight: normal;
            text-shadow: 0px 6px 0px rgba(0,0,0,0.65); /* Лёгкая тень для читаемости */
            margin: 0;
            padding: 20px;
        }
        /* .hero h2
        {
            position: relative;
            display: flex;
            justify-content: space-between
        } */
        .buttons-container
        {
            margin: 0;           /* Убираем внешние отступы */
            padding: 0;          /* Убираем внутренние отступы */
            display: flex;       /* Включаем flex для контейнера */
            width: 100%;         /* Растягиваем на всю ширину */
        }
        .main-btn
        {
            flex: 1;             /* Каждая кнопка занимает РАВНУЮ долю ширины */
            margin: 0;           /* Убираем отступы между кнопками */
            border: none;    /* Убираем скругление углов (если не нужно) */
            font-size: 20px;
            background: rgb(255,255,255);
            color: rgb(0,0,0);
            height: 32px;
            padding: 3px;
        }
        .main-btn:hover
        {
            background-color: #64ae4d;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class='hero'>
        <h1>Сибирь и её экологические проблемы</h1>
    </div>

    <!-- <div class='hero'>
        <h2>
            <button class="planet-btn" onclick="showFact('info')">Общая информация о Сибири</button>
            <button class="planet-btn" onclick="showFact('problems')">Экологические проблемы</button>
            <button class="planet-btn" onclick="showFact('metods')">Методы решения экологических проблем</button>            
        </h2> -->

    <div class='buttons-container'>
        <button class='main-btn'>Общие сведения</button>
        <button class='main-btn'>Экологические проблемы</button>
        <button class='main-btn'>Методы улучшения сиутации</button>
    </div>



</body>
</html>
