<!DOCTYPE html>
<html>
<head>
    <title>Сибирь и её экологические проблемы</title>
    <style>
        .hero
        {
            position: relative;
            background-image: url('Siberia.jpg');
            background-size: cover;
            background-position: center;
            height: 600px;
            display: center;
            align-items: center;
            justify-content: center;
        }
        .hero h1
        {
            position: relative;
            z-index: 2;      /* Чтобы заголовок был ПОВЕРХ затемнения */
            color: white;    /* Белый цвет текста */
            font-size: 48px;
            text-align: center;
            font-family: Arial, sans-serif;
            text-shadow: 0px 0px 4px rgba(0,0,0,0.5); /* Лёгкая тень для читаемости */
            margin: 0;
            padding: 20px;
        }
        .hero h2
        {
            position: relative;
            display: center;
            justify-content: space-between
        }
        .buttons-container
        {
            margin: 0;           /* Убираем внешние отступы */
            padding: 0;          /* Убираем внутренние отступы */
            background: none;    /* Убираем фон */
            display: flex;       /* Включаем flex для контейнера */
            width: 100%;         /* Растягиваем на всю ширину */
        }
        .main-btn
        {
            flex: 1;             /* Каждая кнопка занимает РАВНУЮ долю ширины */
            margin: 0;           /* Убираем отступы между кнопками */
            border-radius: 0;    /* Убираем скругление углов (если не нужно) */
        }
    </style>
</head>
<body>

    <div class='hero'>
        <h1>Сибирь и её экологические проблемы</h1>
    </div>

    <!-- <div class='hero'>
        <h2>
            <button class="planet-btn" onclick="showFact('info')">Общая информация о Сибири</button>
            <button class="planet-btn" onclick="showFact('problems')">Экологические проблемы</button>
            <button class="planet-btn" onclick="showFact('metods')">Методы решения экологических проблем</button>            
        </h2> -->

    <div class="buttons-container">
        <button: class='main-btn'>Кнопка 1</button>
        <button: class='main-btn'>Кнопка 2</button>
        <button: class='main-btn'>Кнопка 3</button>
    </div>



</body>
</html>
