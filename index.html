<!DOCTYPE html>
<html>
<head>
    <title>Сибирь и её экологические проблемы</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 8px; }
        #info { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 10px; }
        .planet-btn { background: #2196F3; }
    </style>
</head>
<body>
    <h1>Сибирь и её экологические проблемы</h1>
    <p>111</p>

    <button class="planet-btn" onclick="showFact('Марс')">Общая информация о Сибири</button>
    <button class="planet-btn" onclick="showFact('Юпитер')">Экологические проблемы</button>
    <button class="planet-btn" onclick="showFact('Сатурн')">Методы решения экологических проблем</button>

    <div id="info">
        ✨ Нажми на кнопку, чтобы узнать факт
    </div>

    <script>
        function showFact(planet) {
            let fact = "";
            if (planet === "Марс") fact = "1";
            else if (planet === "Юпитер") fact = "2";
            else if (planet === "Сатурн") fact = "3";
            document.getElementById("info").innerHTML = "📌 <strong>" + planet + "</strong><br>" + fact;
        }
    </script>
</body>
</html>
